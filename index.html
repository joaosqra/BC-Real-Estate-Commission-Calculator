  <!-- Fonts: Inter (UI) and 'Digital' font for screen -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Braun Palette */
      --braun-body: #191919;
      --braun-button-dark: #282828;
      --braun-button-brown: #3e3836;
      --braun-orange: #d94e18;
      --braun-green: #4a7a52;
      --braun-yellow: #d4b145;
      --braun-text: #ffffff;
      --screen-bg: #2b302b;
      --screen-text: #86c996; /* LCD Green */
      --error-red: #ff3b30;
      
      /* Dimensions */
      --btn-size: 48px;
      --spacing: 16px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      /* Skeumorphic Desk Background */
      background-color: #dcdcd9;
      background-image:
        radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.85) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.18) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"),
        linear-gradient(#e0e0dc, #a8a8a4);
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Changed to flex-start to prevent clipping on mobile */
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      transition: background 0.5s ease;
      overscroll-behavior: none; /* Prevents bounce scroll on mobile */
    }

    /* The Main Device Body */
    .calculator-body {
      /* Noise texture sits on top of a subtle vertical gradient that suggests curved plastic */
      background-color: var(--braun-body);
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.07'/%3E%3C/svg%3E"),
        linear-gradient(180deg, #232323 0%, #191919 35%, #151515 70%, #121212 100%);
      width: 100%;
      max-width: 420px;
      margin: auto; /* Centers vertically when space allows */
      border-radius: 28px;
      padding: 36px 28px 44px;
      /* Layered shadow for floating effect + soft outer rim highlight */
      box-shadow:
        0 60px 90px -22px rgba(0,0,0,0.55),
        0 18px 30px -10px rgba(0,0,0,0.45),
        0 2px 0 rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.5),
        inset 0 0 30px rgba(0,0,0,0.55);
      position: relative;
    }

    /* Long vertical highlight running down the left edge — simulates curved plastic catching room light */
    .calculator-body::before {
      content: '';
      position: absolute;
      top: 36px; bottom: 36px; left: 8px; width: 3px;
      background: linear-gradient(to bottom,
        transparent,
        rgba(255,255,255,0.12) 25%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0.10) 75%,
        transparent);
      filter: blur(1.5px);
      border-radius: 3px;
      pointer-events: none;
    }

    /* Subtle top-edge highlight — the bevel where the top face meets the side */
    .calculator-body::after {
      content: '';
      position: absolute;
      top: 1px; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.35),
        rgba(255,255,255,0.25),
        transparent);
      pointer-events: none;
    }

    /* Branding */
    .brand {
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.2px;
      margin-bottom: 24px;
      opacity: 0.92;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.6), 0 -1px 0 rgba(255,255,255,0.08);
    }

    .brand-mark {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: 1.8px;
      font-size: 13px;
    }

    .brand-mark span {
      font-weight: 400;
      opacity: 0.55;
      font-size: 10px;
      letter-spacing: 1.5px;
      margin-left: 8px;
      padding-left: 8px;
      border-left: 1px solid rgba(255,255,255,0.15);
    }

    /* Solar Cell — small recessed module with a visible cell grid */
    .solar-cell {
      width: 52px;
      height: 14px;
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,0.06) 0,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent 10px),
        linear-gradient(180deg, #1a1a1d, #0c0c0e);
      border-radius: 2px;
      box-shadow:
        inset 0 2px 3px rgba(0,0,0,0.85),
        inset 0 -1px 0 rgba(255,255,255,0.05),
        0 1px 0 rgba(255,255,255,0.06);
      position: relative;
    }
    .solar-cell::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.06) 55%, transparent 65%);
      border-radius: 2px;
      pointer-events: none;
    }

    /* The Main Screen (Price Input) */
    .lcd-screen-container {
      background: linear-gradient(180deg, #050505, #0d0d0d);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 24px;
      /* Deep recessed bezel — light comes from above */
      box-shadow:
        inset 0 3px 5px rgba(0,0,0,0.95),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 1px 0 rgba(255,255,255,0.10),
        0 -1px 0 rgba(0,0,0,0.6);
      transition: box-shadow 0.3s ease;
      position: relative;
    }

    /* Faint chamfered edge around the screen — Braun-style chrome rim */
    .lcd-screen-container::before {
      content: '';
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border-radius: 5px;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      pointer-events: none;
      z-index: 4;
    }

    .lcd-screen {
      background-color: var(--screen-bg);
      border-radius: 4px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      /* Inner shadow for depth + faint vignette */
      box-shadow:
        inset 0 0 24px rgba(0,0,0,0.55),
        inset 0 1px 2px rgba(0,0,0,0.5);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Scanlines effect */
    .lcd-screen::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.05),
        rgba(0,0,0,0.05) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 1;
    }
    
    /* Screen Glare */
    .lcd-screen::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.07), transparent 15%);
      pointer-events: none;
      z-index: 2;
    }

    .screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 3;
    }

    .screen-label {
      color: var(--screen-text);
      font-size: 10px;
      text-transform: uppercase;
      opacity: 0.7;
      font-family: 'Share Tech Mono', monospace;
      transition: text-shadow 0.3s ease;
    }

    /* Error Indicator on Screen */
    .error-indicator {
      font-family: 'Share Tech Mono', monospace;
      color: var(--error-red); /* Red LED style */
      font-size: 10px;
      text-transform: uppercase;
      opacity: 0; /* Hidden by default */
      text-shadow: 0 0 5px rgba(255, 59, 48, 0.5);
      transition: opacity 0.2s;
      background: rgba(50, 0, 0, 0.5);
      padding: 2px 4px;
      border-radius: 2px;
    }
    
    .error-indicator.visible { opacity: 1; }

    input#price {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--screen-text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 38px;
      text-align: right;
      outline: none;
      text-shadow: 0 0 5px rgba(134, 201, 150, 0.5);
      padding: 0;
      margin-top: 4px;
      z-index: 3;
      caret-color: var(--screen-text);
      transition: text-shadow 0.3s ease;
    }
    
    input#price::placeholder {
      color: var(--screen-text);
      opacity: 0.3;
    }

    /* --- Memory Bank Controls --- */
    .memory-bank {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
      padding: 10px 8px 8px;
      /* Subtle recessed panel for the memory bank */
      background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.15));
      border-radius: 6px;
      box-shadow:
        inset 0 2px 3px rgba(0,0,0,0.55),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 1px 0 rgba(255,255,255,0.05);
    }

    .mem-cell { display: flex; flex-direction: column; align-items: center; }

    .mem-btn {
      width: 46px;
      height: 30px;
      border-radius: 4px;
      border: none;
      background: linear-gradient(180deg, #333, #222 55%, #1d1d1d);
      color: #9a9a9a;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow:
        0 2px 0 #0a0a0a,
        0 3px 5px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.5);
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease, color 0.15s ease;
      position: relative;
      overflow: hidden;
      /* Mobile: kill long-press menus, tap highlights, and double-tap zoom */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mem-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }

    /* Hold-progress indicator: fills bottom strip during the 600ms hold */
    .mem-btn::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      width: 0%;
      height: 2px;
      background: var(--braun-green);
      box-shadow: 0 0 6px rgba(74, 122, 82, 0.7);
      pointer-events: none;
      transition: none;
    }

    .mem-btn.holding::after {
      width: 100%;
      transition: width 0.6s linear;
    }

    .mem-btn:active {
      transform: translateY(2px);
      box-shadow:
        0 0 0 #0a0a0a,
        inset 0 2px 4px rgba(0,0,0,0.55);
      background: linear-gradient(180deg, #222, #1a1a1a);
    }

    .mem-btn.saved-flash {
      animation: flashGreen 0.4s ease-out;
    }

    @keyframes flashGreen {
      0%   { background: var(--braun-green); color: #fff; box-shadow: 0 0 0 0 rgba(74,122,82,0.6), inset 0 1px 0 rgba(255,255,255,0.2); }
      100% { background: linear-gradient(180deg, #333, #1d1d1d); color: #9a9a9a; }
    }

    .mem-btn.reset {
      background: linear-gradient(180deg, #e6c25a, #c9a23a 60%, #a8861e);
      color: #1a1a1a;
      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
      box-shadow:
        0 2px 0 #6a541a,
        0 3px 5px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.4),
        inset 0 -1px 0 rgba(0,0,0,0.2);
    }

    .mem-btn.reset:active {
      background: linear-gradient(180deg, #c9a23a, #a8861e);
      color: #111;
      transform: translateY(2px);
      box-shadow:
        0 0 0 #6a541a,
        inset 0 2px 4px rgba(0,0,0,0.25);
    }

    .mem-label {
      font-size: 8.5px;
      color: #5a5a5a;
      text-align: center;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }


    /* The Configuration Grid (Commission Splits) */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      color: #888;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 2px;
      font-weight: 600;
    }

    .analog-input {
      width: 100%;
      background-color: var(--braun-button-dark);
      background-image:
        linear-gradient(180deg, #303030 0%, #262626 55%, #1f1f1f 100%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      background-blend-mode: normal, overlay;
      border: none;
      border-radius: 6px;
      color: white;
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      text-align: center;
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, background-color 0.12s ease-out;

      /* Physical key look — chiclet with darker side wall */
      box-shadow:
        0 4px 0 #0e0e0e,
        0 6px 8px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      transform: translateY(0);
      caret-color: var(--braun-orange);
    }

    .analog-input:hover {
      background-color: #2f2f2f;
    }

    .analog-input:focus {
      outline: none;
      background-color: #333;
      transform: translateY(3px);
      box-shadow:
        0 1px 0 #0e0e0e,
        0 2px 3px rgba(0,0,0,0.3),
        inset 0 0 0 1px var(--braun-orange),
        inset 0 2px 4px rgba(0,0,0,0.25);
    }

    /* Divider Line */
    .divider {
      height: 2px;
      background: #111;
      margin: 0 -28px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Results Section */
    .results-section {
      display: grid;
      gap: 20px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-info {
      display: flex;
      flex-direction: column;
    }

    .result-label {
      color: #777;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .result-value {
      color: #fff;
      font-size: 20px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: -0.5px;
      transition: text-shadow 0.3s ease;
    }

    .result-value.negative {
      color: var(--braun-orange); 
    }

    /* The Tactile Buttons */
    .btn-round {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      color: white;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;

      /* Convex Button — radial highlight + a faint bottom ambient occlusion ring */
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.22), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 70% 90%, rgba(0,0,0,0.35), transparent 60%),
        var(--braun-button-brown);
      box-shadow:
        0 5px 8px rgba(0,0,0,0.45),
        0 1px 0 rgba(255,255,255,0.06),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -2px 4px rgba(0,0,0,0.4);
      transition: transform 0.1s, box-shadow 0.1s, text-shadow 0.3s ease;
      /* Mobile niceties */
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    .btn-round:active {
      transform: translateY(2px);
      box-shadow:
        0 2px 3px rgba(0,0,0,0.45),
        inset 0 2px 5px rgba(0,0,0,0.35);
    }

    .btn-orange {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.35), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 70% 90%, rgba(0,0,0,0.25), transparent 60%),
        var(--braun-orange);
      box-shadow:
        0 5px 12px rgba(217, 78, 24, 0.4),
        0 1px 0 rgba(255,255,255,0.10),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -2px 4px rgba(120, 35, 10, 0.5);
    }

    .btn-dark {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.10), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 70% 90%, rgba(0,0,0,0.4), transparent 60%),
        #222;
    }

    .footer {
      margin-top: 36px;
      text-align: center;
      color: #444;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.05);
    }
    
    .footer a { color: #555; text-decoration: none; }

    /* Tooltip for Copy */
    .copy-feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--braun-orange);
      color: white;
      padding: 12px 24px;
      border-radius: 4px; /* Squarer for industrial look */
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    .copy-feedback.visible { opacity: 1; }
    
    /* Error Banner */
    .error-banner {
      background: rgba(217, 78, 24, 0.1);
      border: 1px solid var(--braun-orange);
      color: var(--braun-orange);
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 4px;
      margin-top: 16px;
      display: none;
      text-align: center;
    }
    .error-banner.visible { display: block; }
    
    /* Memory Feedback Toast */
    .memory-toast {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: var(--braun-green);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-family: 'Share Tech Mono', monospace;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .memory-toast.visible { opacity: 1; }

    /* --- DARK MODE (Lit Up Effect) --- */
    @media (prefers-color-scheme: dark) {
      body {
        /* Darker, "night time" desk environment */
        background-color: #1a1a1a;
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(40,40,40,0.8) 0%, transparent 60%),
          url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"),
          linear-gradient(#1a1a1a, #0d0d0d);
      }

      /* Glowing LCD Screen */
      .lcd-screen-container {
        /* Faint outer glow from screen leakage */
        box-shadow: 
          inset 0 2px 4px rgba(0,0,0,1),
          0 0 15px rgba(134, 201, 150, 0.05); 
      }
      
      .lcd-screen {
        /* Slightly lighter background to simulate backlight bleed */
        background-color: #333a33; 
        box-shadow: inset 0 0 30px rgba(134, 201, 150, 0.2);
      }
      
      /* Glowing Text on Screen */
      input#price, .error-indicator.visible {
        text-shadow: 0 0 10px rgba(134, 201, 150, 0.6), 0 0 2px rgba(134, 201, 150, 0.8);
      }
      
      .screen-label {
        color: rgba(134, 201, 150, 0.8);
        text-shadow: 0 0 5px rgba(134, 201, 150, 0.4);
      }

      /* Illuminated Buttons & Values */
      .btn-round {
         /* White text glows */
         text-shadow: 0 0 6px rgba(255,255,255,0.7);
         /* Slight button rim highlight */
         box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      }
      
      /* Analog input fields glow slightly */
      .analog-input {
         color: #eee;
         text-shadow: 0 0 4px rgba(255,255,255,0.3);
      }
      
      /* Result numbers glow */
      .result-value {
        text-shadow: 0 0 8px rgba(255,255,255,0.5);
      }
      
      .result-value.negative {
        text-shadow: 0 0 8px rgba(217, 78, 24, 0.6);
      }

      /* Calculator Body shadow deepens in dark */
      .calculator-body {
        box-shadow: 
          0 50px 80px -20px rgba(0,0,0,0.9),
          0 10px 20px -5px rgba(0,0,0,0.8),
          inset 0 1px 0 rgba(255,255,255,0.05);
      }
      
      .footer {
        color: #666;
        text-shadow: none;
      }
    }

    /* --- MOBILE APP MODE --- */
    @media (max-width: 600px) {
      body {
        padding: 0;
        margin: 0;
        background: var(--braun-body); /* Remove desk, match device */
        align-items: flex-start;
        overflow-x: hidden;
      }

      .calculator-body {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
        margin: 0;
        /* Handle Safe Areas for iPhone X+ */
        padding-top: max(32px, env(safe-area-inset-top)); 
        padding-bottom: max(32px, env(safe-area-inset-bottom));
        padding-left: 20px;
        padding-right: 20px;
      }

      /* Remove the 3D side bevel + top-edge highlight on mobile since the device fills the viewport */
      .calculator-body::before,
      .calculator-body::after {
        display: none;
      }
      
      /* Adjust Brand for safe area */
      .brand {
        margin-top: 10px;
      }
    }

  </style>
</head>
<body>

  <div class="calculator-body">
    
    <div class="brand">
      <div class="brand-mark">BRAUN<span>ET66</span></div>
      <div class="solar-cell" aria-hidden="true"></div>
    </div>

    <!-- MAIN DISPLAY -->
    <div class="lcd-screen-container">
      <div class="lcd-screen">
        <div class="screen-header">
            <div class="screen-label">Offer Price</div>
            <div class="error-indicator" id="screen-error">ERROR</div>
        </div>
        <input type="text" id="price" placeholder="0" inputmode="numeric" />
        <div id="mem-feedback" class="memory-toast">SAVED TO M1</div>
      </div>
    </div>

    <!-- MEMORY CONTROLS -->
    <div class="memory-bank">
        <div class="mem-cell">
            <button class="mem-btn reset" onclick="resetDefaults()" title="Reset to BC Default" type="button">C</button>
            <div class="mem-label">Reset</div>
        </div>
        <div class="mem-cell">
            <button class="mem-btn" id="m1-btn" type="button" aria-label="Memory 1 — tap to load, hold to save">M1</button>
            <div class="mem-label">Tap · Hold</div>
        </div>
        <div class="mem-cell">
            <button class="mem-btn" id="m2-btn" type="button" aria-label="Memory 2 — tap to load, hold to save">M2</button>
            <div class="mem-label">Tap · Hold</div>
        </div>
        <div class="mem-cell">
            <button class="mem-btn" id="m3-btn" type="button" aria-label="Memory 3 — tap to load, hold to save">M3</button>
            <div class="mem-label">Tap · Hold</div>
        </div>
    </div>

    <!-- CONFIGURATION INPUTS -->
    <div class="controls-grid">
      <div class="input-group">
        <label>Gross (1st 100k)</label>
        <input class="analog-input" type="text" id="total_first" value="7%" />
      </div>
      <div class="input-group">
        <label>Gross (Bal)</label>
        <input class="analog-input" type="text" id="total_rest" value="3%" />
      </div>
      <div class="input-group">
        <label>Co-op (1st 100k)</label>
        <input class="analog-input" type="text" id="coop_first" value="3.255%" />
      </div>
      <div class="input-group">
        <label>Co-op (Bal)</label>
        <input class="analog-input" type="text" id="coop_rest" value="1.1625%" />
      </div>
    </div>

    <div class="divider"></div>

    <!-- RESULTS (Readouts) -->
    <div class="results-section">
      
      <!-- Row 1: Gross -->
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Total Commission</span>
          <span class="result-value" id="gross">$0.00</span>
        </div>
        <button class="btn-round" onclick="copySingle('gross')">Copy</button>
      </div>

      <!-- Row 2: Listing Agent (Swapped Up) -->
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Listing Agent</span>
          <span class="result-value" id="listing">$0.00</span>
        </div>
        <!-- Orange Button for Primary Action -->
        <button class="btn-round btn-orange" onclick="copySingle('listing')">Copy</button>
      </div>

      <!-- Row 3: Buyer's Agent (Swapped Down) -->
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Buyer's Agent</span>
          <span class="result-value" id="coop">$0.00</span>
        </div>
        <button class="btn-round btn-dark" onclick="copySingle('coop')">Copy</button>
      </div>

       <!-- Row 4: GST -->
       <div class="result-row">
        <div class="result-info">
          <span class="result-label">GST (5%)</span>
          <span class="result-value" id="gst" style="opacity: 0.6; font-size: 16px;">$0.00</span>
        </div>
      </div>

      <!-- Error Message Area -->
      <div id="error-msg" class="error-banner">
        ⚠️ Listing commission is negative. Check splits.
      </div>

    </div>

    <div class="footer">
      Designed in BC 🇨🇦 by <a href="https://www.linkedin.com/in/joaosqra/" target="_blank">@joaosqra</a>
    </div>

  </div>

  <!-- Feedback Toast -->
  <div id="toast" class="copy-feedback">Copied</div>

  <script>
    // --- Configuration ---
    const DEFAULTS = {
        totalFirst: "7%",
        totalRest: "3%",
        coopFirst: "3.255%",
        coopRest: "1.1625%"
    };

    // --- Logic ---
    const formatCurrency = (val) => 
      new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(val);

    const parsePercent = (val) => {
      if (!val) return 0;
      return parseFloat(val.replace(/[^0-9.]/g, '')) / 100 || 0;
    };

    const parseNumber = (val) => {
      if (!val) return 0;
      return parseFloat(String(val).replace(/,/g, '')) || 0;
    };

    const formatNumberWithCommas = (val) => {
      if (!val) return '';
      return val.toLocaleString('en-CA');
    };

    function calculate() {
      const priceVal = document.getElementById('price').value;
      const price = parseNumber(priceVal);

      // Get Split Configs
      const totalFirst = parsePercent(document.getElementById('total_first').value);
      const totalRest = parsePercent(document.getElementById('total_rest').value);
      const coopFirst = parsePercent(document.getElementById('coop_first').value);
      const coopRest = parsePercent(document.getElementById('coop_rest').value);

      // Logic
      const first100k = Math.min(100000, price);
      const remaining = Math.max(0, price - 100000);

      const gross = (first100k * totalFirst) + (remaining * totalRest);
      const coop = (first100k * coopFirst) + (remaining * coopRest);
      const listing = gross - coop;
      const gst = gross * 0.05;

      // Render
      document.getElementById('gross').innerText = formatCurrency(gross);
      document.getElementById('coop').innerText = formatCurrency(coop);
      document.getElementById('listing').innerText = formatCurrency(listing);
      document.getElementById('gst').innerText = formatCurrency(gst);

      // Error indication
      const listingEl = document.getElementById('listing');
      const errorMsg = document.getElementById('error-msg');
      const screenError = document.getElementById('screen-error');
      
      if (listing < 0) {
        listingEl.classList.add('negative');
        errorMsg.classList.add('visible');
        screenError.classList.add('visible');
      } else {
        listingEl.classList.remove('negative');
        errorMsg.classList.remove('visible');
        screenError.classList.remove('visible');
      }
    }

    // --- Memory Functions ---
    // Tap = load, Hold (600ms) = save. Works reliably on both desktop and mobile.
    const HOLD_MS = 600;
    const MOVE_CANCEL_PX = 10; // cancel if finger drifts (likely scrolling)

    function setupMemoryButtons() {
        ['m1', 'm2', 'm3'].forEach(id => {
            const btn = document.getElementById(id + '-btn');
            let pressTimer = null;
            let pressStart = 0;
            let didSave = false;
            let startX = 0, startY = 0;
            let activePointerType = null; // 'touch' | 'mouse'

            const beginPress = (x, y, pointerType) => {
                // Ignore mouse press right after a touch (synthetic mouse events)
                if (activePointerType === 'touch' && pointerType === 'mouse') return;
                activePointerType = pointerType;
                pressStart = Date.now();
                didSave = false;
                startX = x; startY = y;
                btn.classList.add('holding');
                pressTimer = setTimeout(() => {
                    saveToMemory(id);
                    didSave = true;
                    if (navigator.vibrate) navigator.vibrate(35);
                    pressTimer = null;
                    btn.classList.remove('holding');
                }, HOLD_MS);
            };

            const endPress = (pointerType) => {
                if (pointerType && activePointerType && pointerType !== activePointerType) return;
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                    // Short tap → load
                    if (!didSave && Date.now() - pressStart < HOLD_MS) {
                        loadFromMemory(id);
                    }
                }
                btn.classList.remove('holding');
                // Release the input-source lock shortly after, so future events work.
                setTimeout(() => { activePointerType = null; }, 350);
            };

            const cancelPress = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                btn.classList.remove('holding');
                activePointerType = null;
            };

            const checkDrift = (x, y) => {
                if (Math.abs(x - startX) > MOVE_CANCEL_PX || Math.abs(y - startY) > MOVE_CANCEL_PX) {
                    cancelPress();
                }
            };

            // --- Touch (mobile) ---
            btn.addEventListener('touchstart', (e) => {
                // preventDefault avoids the iOS callout/selection menu AND the synthetic mousedown
                e.preventDefault();
                const t = e.touches[0];
                beginPress(t.clientX, t.clientY, 'touch');
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                endPress('touch');
            }, { passive: false });

            btn.addEventListener('touchcancel', cancelPress);

            btn.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t) checkDrift(t.clientX, t.clientY);
            }, { passive: true });

            // --- Mouse (desktop) ---
            btn.addEventListener('mousedown', (e) => {
                beginPress(e.clientX, e.clientY, 'mouse');
            });
            btn.addEventListener('mouseup', () => endPress('mouse'));
            btn.addEventListener('mouseleave', cancelPress);

            // Suppress the long-press context menu on every platform
            btn.addEventListener('contextmenu', (e) => e.preventDefault());
        });
    }

    function saveToMemory(slot) {
        const config = {
            totalFirst: document.getElementById('total_first').value,
            totalRest: document.getElementById('total_rest').value,
            coopFirst: document.getElementById('coop_first').value,
            coopRest: document.getElementById('coop_rest').value
        };
        localStorage.setItem('calc_mem_' + slot, JSON.stringify(config));
        
        // Feedback
        const btn = document.getElementById(slot + '-btn');
        btn.classList.add('saved-flash');
        setTimeout(() => btn.classList.remove('saved-flash'), 400);
        
        showMemoryFeedback(`SAVED TO ${slot.toUpperCase()}`);
    }

    function loadFromMemory(slot) {
        const saved = localStorage.getItem('calc_mem_' + slot);
        if (saved) {
            const config = JSON.parse(saved);
            document.getElementById('total_first').value = config.totalFirst;
            document.getElementById('total_rest').value = config.totalRest;
            document.getElementById('coop_first').value = config.coopFirst;
            document.getElementById('coop_rest').value = config.coopRest;
            calculate();
            showMemoryFeedback(`LOADED ${slot.toUpperCase()}`);
        } else {
            showMemoryFeedback(`${slot.toUpperCase()} EMPTY`);
        }
    }

    function resetDefaults() {
        document.getElementById('total_first').value = DEFAULTS.totalFirst;
        document.getElementById('total_rest').value = DEFAULTS.totalRest;
        document.getElementById('coop_first').value = DEFAULTS.coopFirst;
        document.getElementById('coop_rest').value = DEFAULTS.coopRest;
        calculate();
        showMemoryFeedback("RESET DEFAULTS");
    }

    function showMemoryFeedback(text) {
        const el = document.getElementById('mem-feedback');
        el.innerText = text;
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 1500);
    }


    // --- Input Formatting ---
    function handleFocus(e) {
      let val = e.target.value;
      if (e.target.id === 'price') {
        val = val.replace(/,/g, '');
      } else {
        val = val.replace('%', '');
      }
      e.target.value = val;
      e.target.select();
    }

    function handleBlur(e) {
      if (e.target.id === 'price') {
        const num = parseNumber(e.target.value);
        if (num > 0) e.target.value = formatNumberWithCommas(num);
      } else {
        let raw = parseFloat(e.target.value);
        if (!isNaN(raw)) {
           e.target.value = raw + '%';
        }
      }
      calculate();
    }
    
    // Strict input filter for Price
    function restrictInput(e) {
        if (e.target.id === 'price') {
            const clean = e.target.value.replace(/[^0-9]/g, '');
            if (clean !== e.target.value) {
                e.target.value = clean;
            }
            calculate();
        }
    }

    // --- Clipboard ---
    function copySingle(id) {
      const rawText = document.getElementById(id).innerText;
      const val = rawText.replace(/[^\d.]/g, '');
      
      navigator.clipboard.writeText(val).then(() => {
        showToast();
      });
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 1500);
    }

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(i => {
        if(i.id === 'price') {
             i.addEventListener('input', restrictInput);
        } else {
             i.addEventListener('input', calculate);
        }
        i.addEventListener('focus', handleFocus);
        i.addEventListener('blur', handleBlur);
      });
      
      setupMemoryButtons();
      calculate();
    });
  </script>
</body>
</html>
